# vs_control_params.yaml

# =========================================
# 1. 算法选择与分辨率设置
# =========================================
# 算法类型 (如果您已按照上一条回答修改了代码支持多算法切换)
# 可选值: "dvs", "direct", "new_algo" 等
algorithm_type: "dvs"

# 图像分辨率 (必须与相机发布的分辨率一致)
resolution_x: 640
resolution_y: 480

# =========================================
# 2. 控制参数
# =========================================
# 增益系数 lambda (控制收敛速度，值越大速度越快但可能不稳定)
lambda: 0.5

# 收敛阈值 epsilon (特征误差的均方误差小于此值时停止)
epsilon: 8

# =========================================
# 3. TF 坐标系设置
# =========================================

# 相机光心坐标系名称
camera_frame: "camera_color_optical_frame"

# =========================================
# 4. 相机内参 (可选)
# =========================================
# 如果不设置，代码中会使用默认的硬编码参数 (600, 320, 600, 240)
# 格式: [fx, 0, cx, 0, fy, cy, 0, 0, 1] (行优先的 3x3 矩阵展平)
camera_intrinsic: [603.787, 0.0, 326.253, 
                  0.0, 604.112, 240.154, 
                  0.0, 0.0, 1.0]
